name: Fixed eta full ATP run

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fixed-eta-full-run.yml"

permissions:
  contents: read

env:
  RUN_ROOT: experiments/github-runs/fixed-eta-2026-07-11

jobs:
  build-tools:
    name: Build E and Vampire
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git gawk python3

      - name: Build E prover with four cores
        run: |
          set -euxo pipefail
          git clone --depth 1 https://github.com/eprover/eprover.git "$RUNNER_TEMP/eprover"
          cd "$RUNNER_TEMP/eprover"
          ./configure
          make -j4
          mkdir -p "$GITHUB_WORKSPACE/prover-bin"
          cp PROVER/eprover "$GITHUB_WORKSPACE/prover-bin/eprover"
          git rev-parse HEAD > "$GITHUB_WORKSPACE/prover-bin/eprover.commit"

      - name: Build Vampire with four cores
        run: |
          set -euxo pipefail
          git clone --recursive --depth 1 https://github.com/vprover/vampire.git "$RUNNER_TEMP/vampire"
          cd "$RUNNER_TEMP/vampire/z3"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DZ3_BUILD_EXECUTABLE=OFF -DZ3_BUILD_TEST_EXECUTABLES=OFF -DZ3_BUILD_LIBZ3_SHARED=OFF
          make -j4 -C build
          cd "$RUNNER_TEMP/vampire"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCCACHE_PROGRAM=OFF
          make -j4 -C build vampire
          cp build/vampire "$GITHUB_WORKSPACE/prover-bin/vampire"
          git rev-parse HEAD > "$GITHUB_WORKSPACE/prover-bin/vampire.commit"

      - name: Record tool versions
        run: |
          chmod +x prover-bin/eprover prover-bin/vampire
          prover-bin/eprover --version > prover-bin/eprover.version 2>&1 || true
          prover-bin/vampire --version > prover-bin/vampire.version 2>&1 || true
          ls -lh prover-bin

      - name: Upload prover binaries
        uses: actions/upload-artifact@v4
        with:
          name: fixed-eta-prover-binaries
          path: prover-bin/
          retention-days: 7

  prove:
    name: "${{ matrix.slot }} · ${{ matrix.prover }} · ${{ matrix.mode }} · ${{ matrix.variant }}"
    needs: build-tools
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 20
      matrix:
        include:
          - {slot: "01", prover: e,       mode: auto,     variant: base}
          - {slot: "02", prover: e,       mode: auto,     variant: row-image}
          - {slot: "03", prover: e,       mode: auto,     variant: expanded}
          - {slot: "04", prover: e,       mode: auto,     variant: contradiction}
          - {slot: "05", prover: e,       mode: auto,     variant: ground-boost}
          - {slot: "06", prover: e,       mode: sat,      variant: base}
          - {slot: "07", prover: e,       mode: sat,      variant: row-image}
          - {slot: "08", prover: e,       mode: sat,      variant: expanded}
          - {slot: "09", prover: e,       mode: sat,      variant: contradiction}
          - {slot: "10", prover: e,       mode: sat,      variant: ground-boost}
          - {slot: "11", prover: vampire, mode: casc,     variant: base}
          - {slot: "12", prover: vampire, mode: casc,     variant: row-image}
          - {slot: "13", prover: vampire, mode: casc,     variant: expanded}
          - {slot: "14", prover: vampire, mode: casc,     variant: contradiction}
          - {slot: "15", prover: vampire, mode: casc,     variant: ground-boost}
          - {slot: "16", prover: vampire, mode: casc_sat, variant: base}
          - {slot: "17", prover: vampire, mode: casc_sat, variant: row-image}
          - {slot: "18", prover: vampire, mode: casc_sat, variant: expanded}
          - {slot: "19", prover: vampire, mode: casc_sat, variant: contradiction}
          - {slot: "20", prover: vampire, mode: casc_sat, variant: ground-boost}

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Download prover binaries
        uses: actions/download-artifact@v4
        with:
          name: fixed-eta-prover-binaries
          path: prover-bin

      - name: Prepare runner
        run: |
          chmod +x prover-bin/eprover prover-bin/vampire "$RUN_ROOT/run_one.sh"
          echo "$GITHUB_WORKSPACE/prover-bin" >> "$GITHUB_PATH"
          nproc
          free -h

      - name: Run full four-core search
        run: |
          bash "$RUN_ROOT/run_one.sh" \
            "${{ matrix.prover }}" \
            "${{ matrix.mode }}" \
            "${{ matrix.variant }}" \
            "${{ matrix.slot }}"

      - name: Upload logs and proof objects
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "fixed-eta-${{ matrix.slot }}-${{ matrix.prover }}-${{ matrix.mode }}-${{ matrix.variant }}"
          path: "run-output/slot-${{ matrix.slot }}/"
          if-no-files-found: warn
          retention-days: 30
